# ============================================================
# DroidPulse CI/CD Integration — GitHub Actions Example
# Add this to your Android project at:
# .github/workflows/performance-check.yml
# ============================================================

name: Performance Regression Check

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

jobs:
  performance-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Run your app tests here (Espresso, etc.)
      # The DroidPulse SDK will automatically upload performance data
      # to the cloud during test execution

      - name: Wait for performance data
        run: sleep 30  # Wait for SDK to upload session data

      - name: Check Performance Regression
        run: |
          npx droidpulse-ci report \
            --api-key ${{ secrets.DROIDPULSE_API_KEY }} \
            --version ${{ github.event.pull_request.head.sha }} \
            --baseline main \
            --endpoint https://api.droidpulse.dev
        env:
          DROIDPULSE_API_KEY: ${{ secrets.DROIDPULSE_API_KEY }}

      - name: Post Results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            // Post performance report as PR comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚡ DroidPulse performance check completed. See Actions tab for details.'
            })
