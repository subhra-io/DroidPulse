# DroidPulse Analytics - Simple Setup
# Start with just ClickHouse for analytics storage

services:
  # ClickHouse - High-performance analytics database
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: droidpulse-clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: droidpulse
      CLICKHOUSE_USER: analytics
      CLICKHOUSE_PASSWORD: droidpulse123
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - droidpulse-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: droidpulse-redis
    ports:
      - "6380:6379"  # Use different port to avoid conflict
    volumes:
      - redis_data:/data
    networks:
      - droidpulse-network
    restart: unless-stopped

volumes:
  clickhouse_data:
    driver: local
  redis_data:
    driver: local

networks:
  droidpulse-network:
    driver: bridge